# Mullm — profile: core | access | rag | evolution | legacy | full
# Usage: docker compose --profile core up -d

services:
  postgres:
    profiles: [core, access, rag, evolution, full]
    image: postgres:15
    environment:
      POSTGRES_DB: mullm
      POSTGRES_USER: mullm
      POSTGRES_PASSWORD: mullm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - mullm_network

  nats:
    profiles: [core, access, rag, evolution, full]
    image: nats:2.9
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]
    networks:
      - mullm_network

  redis:
    profiles: [core, full]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mullm_network

  eventstoredb:
    profiles: [core, evolution, full]
    image: eventstore/eventstore:24.10.0-bookworm-slim
    command: >
      --insecure
      --run-projections=All
      --enable-atom-pub-over-http
    ports:
      - "2113:2113"
    volumes:
      - eventstore_data:/var/lib/eventstore
    networks:
      - mullm_network

  orchestrator:
    profiles: [core, access, rag, evolution, full]
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    volumes:
      - ./catalog:/app/catalog:ro
      - access_data:/data
    environment:
      - MULLM_LOCALFS_ROOT=/data
      - MULLM_TRANSPORT_SANDBOX=/data/transport
      - DATABASE_URL=postgresql://mullm:mullm_password@postgres:5432/mullm
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - EVENT_STORE_BACKEND=${EVENT_STORE_BACKEND:-postgres}
      - EVENTSTORE_URL=esdb://eventstoredb:2113?tls=false
      - CATALOG_PATH=/app/catalog
      - ENVIRONMENT=dev
    depends_on:
      - postgres
      - nats
    ports:
      - "8001:8000"
    networks:
      - mullm_network

  projector:
    profiles: [core, access, rag, evolution, full]
    build:
      context: ./services/projector
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://mullm:mullm_password@postgres:5432/mullm
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - nats
    ports:
      - "8002:8000"
    networks:
      - mullm_network

  web:
    profiles: [core, full]
    build:
      context: ./services/web
      dockerfile: Dockerfile
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - PROJECTOR_URL=http://projector:8000
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
      - projector
    networks:
      - mullm_network

  shell-agent-a:
    profiles: [core, full]
    build:
      context: ./agents/shell-agent
      dockerfile: Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - AGENT_ID=shell-agent-a
    depends_on:
      - nats
    networks:
      - mullm_network

  shell-agent-b:
    profiles: [core, full]
    build:
      context: ./agents/shell-agent
      dockerfile: Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - AGENT_ID=shell-agent-b
    depends_on:
      - nats
    networks:
      - mullm_network

  # Access Fabric — embedded in orchestrator; extra volume for localfs sandbox
  access-data:
    profiles: [access, full]
    image: busybox:latest
    command: ["sh", "-c", "mkdir -p /data/inbox && sleep infinity"]
    volumes:
      - access_data:/data
    networks:
      - mullm_network

  # --- planned: rag profile (Sprint 6) ---
  indexer:
    profiles: [rag, full]
    image: busybox:latest
    command: ["sh", "-c", "echo indexer planned && sleep infinity"]
    networks:
      - mullm_network

volumes:
  postgres_data:
  eventstore_data:
  access_data:

networks:
  mullm_network:
    driver: bridge
