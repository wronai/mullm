# Mullm — profile: core | access | rag | evolution | nlp2dsl | full
# Ustaw w .env: COMPOSE_PROFILES=core,web  (albo: docker compose --profile core up -d)

services:
  postgres:
    profiles: [core, access, rag, evolution, full]
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${MULLM_POSTGRES_HOST_PORT}:${MULLM_POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - mullm_network

  nats:
    profiles: [core, access, rag, evolution, full]
    image: nats:2.9
    ports:
      - "${MULLM_NATS_CLIENT_HOST_PORT}:${MULLM_NATS_CLIENT_PORT}"
      - "${MULLM_NATS_MONITOR_HOST_PORT}:${MULLM_NATS_MONITOR_PORT}"
    command: ["--http_port", "${MULLM_NATS_MONITOR_PORT}"]
    networks:
      - mullm_network

  redis:
    profiles: [core, full]
    image: redis:7-alpine
    ports:
      - "${MULLM_REDIS_HOST_PORT}:${MULLM_REDIS_PORT}"
    networks:
      - mullm_network

  eventstoredb:
    profiles: [core, evolution, full]
    image: eventstore/eventstore:24.10.0-bookworm-slim
    command: >
      --insecure
      --run-projections=All
      --enable-atom-pub-over-http
    ports:
      - "${MULLM_EVENTSTORE_HOST_PORT}:${MULLM_EVENTSTORE_PORT}"
    volumes:
      - eventstore_data:/var/lib/eventstore
    networks:
      - mullm_network

  orchestrator:
    profiles: [core, access, rag, evolution, full]
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./catalog:/app/catalog:ro
      - access_data:/data
      - rag_data:/data/rag
    environment:
      - MULLM_LOCALFS_ROOT=/data
      - MULLM_TRANSPORT_SANDBOX=/data/transport
      - DATABASE_URL=${MULLM_DATABASE_URL}
      - NATS_URL=${MULLM_NATS_URL}
      - REDIS_URL=${MULLM_REDIS_URL}
      - EVENT_STORE_BACKEND=${EVENT_STORE_BACKEND:-postgres}
      - EVENTSTORE_URL=${MULLM_EVENTSTORE_URL}
      - CATALOG_PATH=/app/catalog
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - RAG_AUTO_INGEST=${RAG_AUTO_INGEST:-true}
    depends_on:
      - postgres
      - nats
    ports:
      - "${MULLM_ORCHESTRATOR_HOST_PORT}:${MULLM_ORCHESTRATOR_PORT}"
    networks:
      - mullm_network

  projector:
    profiles: [core, access, rag, evolution, full]
    build:
      context: ./services/projector
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=${MULLM_DATABASE_URL}
      - NATS_URL=${MULLM_NATS_URL}
    depends_on:
      - postgres
      - nats
    ports:
      - "${MULLM_PROJECTOR_HOST_PORT}:${MULLM_PROJECTOR_PORT}"
    networks:
      - mullm_network

  nlp2dsl-nlp:
    profiles: [nlp2dsl, full]
    build:
      context: ../nlp2dsl/nlp-service
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openrouter/openai/gpt-5-mini}
    ports:
      - "${MULLM_NLP2DSL_NLP_HOST_PORT:-8012}:8002"
    networks:
      - mullm_network

  nlp2dsl-backend:
    profiles: [nlp2dsl, full]
    build:
      context: ../nlp2dsl/backend
    environment:
      - NLP_SERVICE_URL=http://nlp2dsl-nlp:8002
      - WORKER_URL=http://nlp2dsl-worker:8000
    ports:
      - "${MULLM_NLP2DSL_BACKEND_HOST_PORT:-8010}:8000"
    depends_on:
      - nlp2dsl-nlp
      - nlp2dsl-worker
    networks:
      - mullm_network

  nlp2dsl-worker:
    profiles: [nlp2dsl, full]
    build:
      context: ../nlp2dsl/worker
    networks:
      - mullm_network

  web:
    profiles: [core, full]
    build:
      context: ./services/web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ORCHESTRATOR_URL=${MULLM_ORCHESTRATOR_URL}
      - PROJECTOR_URL=${MULLM_PROJECTOR_URL}
      - NLP2DSL_BACKEND_URL=${MULLM_NLP2DSL_BACKEND_URL:-http://nlp2dsl-backend:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MULLM_WEB_HOST_PORT}:${MULLM_WEB_PORT}"
    depends_on:
      - orchestrator
      - projector
    networks:
      - mullm_network

  shell-agent-a:
    profiles: [core, full]
    build:
      context: ./agents/shell-agent
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NATS_URL=${MULLM_NATS_URL}
      - AGENT_ID=shell-agent-a
    depends_on:
      - nats
    networks:
      - mullm_network

  shell-agent-b:
    profiles: [core, full]
    build:
      context: ./agents/shell-agent
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NATS_URL=${MULLM_NATS_URL}
      - AGENT_ID=shell-agent-b
    depends_on:
      - nats
    networks:
      - mullm_network

  access-data:
    profiles: [access, full]
    image: busybox:latest
    command: ["sh", "-c", "mkdir -p /data/inbox && sleep infinity"]
    volumes:
      - access_data:/data
    networks:
      - mullm_network

volumes:
  postgres_data:
  eventstore_data:
  access_data:
  rag_data:

networks:
  mullm_network:
    driver: bridge
