<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mullm</title>
  <link rel="stylesheet" href="/static/workspace.css" />
</head>
<body class="ws-simple ws-chat-first">
  <header class="topbar topbar-min">
    <h1><a href="/" class="brand-link">Mullm</a></h1>
    <span class="tag">Chat prowadzi rozmowę · nlp2dsl</span>
    <span class="spacer"></span>
    <a href="/workroom" class="btn ghost btn-sm" title="Multi-agent workroom">◇ Agenci</a>
    <button type="button" class="btn ghost btn-sm" id="btn-toggle-tickets" title="Tickety">◎</button>
    <button type="button" class="btn ghost btn-sm" id="btn-copy-chat">Chat</button>
    <button type="button" class="btn btn-sm" id="btn-refresh">↻</button>
  </header>

  <div class="layout-chat-first">
    <aside class="rail-tickets" id="rail-tickets">
      <div class="rail-head">
        <input type="search" id="ticket-search" class="ticket-search" placeholder="Ticket…" />
        <div class="view-tabs mini">
          <button type="button" class="tab active" data-view="active">●</button>
          <button type="button" class="tab" data-view="archived">▣</button>
        </div>
      </div>
      <div class="task-list" id="task-list"></div>
    </aside>

    <main class="chat-main">
      <div id="chat-messages" class="chat-messages"></div>

      <div id="clarify-panel" class="clarify-panel" hidden>
        <p class="clarify-title">AI potrzebuje doprecyzowania</p>
        <p id="clarify-hint" class="clarify-hint"></p>
        <form id="clarify-form" class="clarify-form"></form>
        <button type="submit" form="clarify-form" class="btn success">Wyślij odpowiedź</button>
      </div>

      <div class="chat-compose chat-compose-min">
        <textarea id="chat-input" rows="2" placeholder="Napisz co chcesz zrobić — AI dopyta jeśli trzeba…"></textarea>
        <div class="chat-toolbar">
          <button type="button" class="btn" id="chat-send">Wyślij</button>
          <button type="button" class="btn ghost btn-sm" id="btn-attach-file">📎</button>
          <input type="file" id="chat-files" multiple hidden />
          <select id="chat-mode" class="mode-select" title="Tryb">
            <option value="discuss" selected>Auto</option>
            <option value="search_context">RAG</option>
            <option value="run_task">Shell</option>
          </select>
          <label class="wait-confirm" title="Ticket trafi na listę bez auto-uruchomienia">
            <input type="checkbox" id="wait-for-confirmation" />
            Czekaj na potwierdzenie
          </label>
        </div>
      </div>
    </main>

    <aside class="rail-ticket" id="ticket-panel">
      <div id="ticket-detail" class="ticket-detail empty">
        <p class="muted">Ticket pojawi się po utworzeniu.</p>
      </div>
    </aside>
  </div>

  <dialog id="task-dialog" class="task-dialog">
    <h3>Ticket (ręcznie)</h3>
    <form id="task-form">
      <label>Tytuł<input name="title" required /></label>
      <label>Shell<input name="shell_command" placeholder="ls -la" /></label>
      <label class="wait-confirm">
        <input type="checkbox" name="wait_for_confirmation" id="form-wait-confirm" />
        Czekaj na potwierdzenie na liście ticketów
      </label>
      <button type="submit" class="btn">Utwórz i uruchom</button>
      <button type="button" class="btn ghost" id="form-close">×</button>
    </form>
  </dialog>

  <div id="toast" class="toast-bar"></div>
  <script>window.__DEEP_LINK_TICKET__ = {{ deep_link_ticket|default(none)|tojson }};</script>
  <script src="/static/workspace.js"></script>
</body>
</html>
