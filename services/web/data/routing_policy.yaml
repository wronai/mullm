# Polityka ingress czatu Mullm (kolejność kroków + agenci).
# Nadpisanie ścieżki: MULLM_ROUTING_POLICY_PATH lub env w docker-compose.

version: 1

# Domyślny pipeline (tryb Auto / discuss)
# nlp2dsl_resume = dopytania / formularz gdy trwa rozmowa workflow (in_progress)
ingress_order:
  - nlp2dsl_resume
  - nlp2dsl_orient
  - rag_probe
  - rules
  - agent_shell
  - nlp2dsl
  - rag_answer

agents:
  default: shell_agent
  by_route:
    mullm_file_list: files_agent
    mullm_shell: shell_agent
    nlp2cmd_shell: shell_agent
    nlp2dsl: coordinator
    rag: user
    workroom_hint: coordinator
    unknown: coordinator
  prefer_session_agent: true

# Pluginy zewnętrzne (implementacja: services/web/app/agent_plugins/)
agent_plugins:
  - id: nlp2cmd
    integration: integrations/nlp2cmd
    ingress_steps: [agent_shell]
    executor: shell_agent
  - id: nlp2dsl
    integration: integrations/nlp2dsl
    ingress_steps: [nlp2dsl]
    executor: coordinator

rag_probe:
  enabled: true
  min_hits: 1
  search_limit: 4
  # false = tylko oznacz trafienie; pełna odpowiedź w rag_answer / rules
  answer_on_hit: false
  skip_file_list_intent: true
  skip_shell_prefix: true

# Nadpisanie całego pipeline per tryb czatu (select w UI)
mode_overrides:
  search_context:
    ingress_order: [rag_answer]
  run_task:
    ingress_order: [rules]

# Standardy oczekiwań użytkownika (dokumentacja + dopasowanie w /api/routing/explain).
# Rozszerzaj phrases / reason_codes — logika file_list/shell nadal w chat.py + prompt_router.
user_expectations:
  - id: file_list_user_scope_registry
    match:
      phrases:
        - "lista plikow usera z rejestru"
        - "lista plików użytkownika wgrane"
        - "user files w workspace"
        - "user files localfs"
    route: mullm_file_list
    reason_codes: [intent_file_list, scope_user, expectation_file_list_registry]
    standard: "Rejestr Access Fabric (files_agent) — jawny rejestr/wgrane/localfs."
  - id: shell_host_user_files
    match:
      phrases:
        - "lista plikow usera"
        - "lista plików użytkownika"
        - "user files"
      exclude_phrases:
        - "rejestr"
        - "access fabric"
        - "wgrane"
        - "localfs"
        - "workspace"
    route: nlp2cmd_shell
    reason_codes: [ingress_agent_shell, nlp2cmd_translate, expectation_host_user_files]
    standard: "Domyślnie: katalog domowy na hoście (nlp2cmd → ls ~), nie rejestr Mullm."
  - id: shell_explicit_prefix
    match:
      phrases: ["run ls", "exec ", "shell "]
    route: mullm_shell
    reason_codes: [shell_prefix, expectation_shell_explicit]
    standard: "Jawny prefix run/exec → ticket shell_agent."
  - id: nlp2dsl_clarify_workflow
    match:
      phrases:
        - "wyślij fakturę"
        - "wyslij fakture"
        - "automatyzacj"
    route: nlp2dsl
    reason_codes: [delegate_nlp2dsl, expectation_nlp2dsl_clarify]
    standard: "Workflow z brakującymi polami → nlp2dsl dopytuje (formularz clarify)."
  - id: shell_nl_disk_space
    match:
      phrases:
        - "sprawdz miejsce na dysku"
        - "miejsce na dysku"
    route: nlp2cmd_shell
    reason_codes: [ingress_agent_shell, nlp2cmd_translate, expectation_disk_check]
    standard: "NL → nlp2cmd (np. df -h) → shell_agent; nie mylić z file_list."
